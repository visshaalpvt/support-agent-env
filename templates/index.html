<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupportAgentEnv - Customer Support AI Training</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 25px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #10b981;
            color: white;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 8px;
        }

        /* Difficulty Buttons */
        .difficulty-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .difficulty-btn.easy { background: #10b981; color: white; }
        .difficulty-btn.medium { background: #f59e0b; color: white; }
        .difficulty-btn.hard { background: #ef4444; color: white; }
        .difficulty-btn.active { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        /* Cards */
        .card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .ticket-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
            border-left: 4px solid #667eea;
        }

        .ticket-text {
            font-size: 16px;
            line-height: 1.5;
            color: #f1f5f9;
            margin: 12px 0;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        .ticket-id {
            font-size: 11px;
            color: #64748b;
        }

        .ai-suggestion {
            margin-top: 12px;
            padding: 8px 12px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 8px;
            font-size: 12px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #94a3b8;
            font-weight: 500;
            font-size: 13px;
        }

        select, textarea {
            width: 100%;
            padding: 10px;
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Wrong Answer Indicator */
        select.wrong, textarea.wrong {
            border-color: #ef4444;
            box-shadow: 0 0 5px rgba(239, 68, 68, 0.5);
        }

        select.correct, textarea.correct {
            border-color: #10b981;
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 15px;
        }
        .btn-primary:hover { background: #5a67d8; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-secondary { background: #64748b; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm { padding: 5px 10px; font-size: 11px; }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        /* Score Display */
        .score-card {
            text-align: center;
            padding: 20px;
            border-radius: 16px;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }

        .score-card.high {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }

        .score-card.medium {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
        }

        .score-card.low {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        .score-value {
            font-size: 48px;
            font-weight: bold;
        }

        .score-percent {
            font-size: 20px;
            opacity: 0.8;
        }

        /* Feedback */
        .feedback {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
        }

        .feedback.wrong {
            background: rgba(239, 68, 68, 0.2);
            border-left: 3px solid #ef4444;
        }

        .feedback.correct {
            background: rgba(16, 185, 129, 0.2);
            border-left: 3px solid #10b981;
        }

        /* Quality Indicators */
        .quality-indicators {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .indicator {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .indicator.good {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .indicator.bad {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* History Table */
        .history-table {
            width: 100%;
            font-size: 12px;
        }

        .history-table th {
            text-align: left;
            padding: 8px;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .history-table td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .history-score-high { color: #10b981; font-weight: bold; }
        .history-score-medium { color: #f59e0b; font-weight: bold; }
        .history-score-low { color: #ef4444; font-weight: bold; }

        .history-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 10px;
        }

        .history-badge.easy { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .history-badge.medium { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .history-badge.hard { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .hidden-field { display: none; }

        .thinking-message {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
            animation: pulse 1s infinite;
            font-weight: bold;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 SupportAgentEnv</h1>
            <p>OpenEnv Customer Support Training & Evaluation Dashboard</p>
            <div class="status-badge" id="apiStatus">🟢 API Connected</div>
        </div>

        <div class="difficulty-container">
            <button class="difficulty-btn easy active" data-diff="easy">🟢 Easy (Classification Only)</button>
            <button class="difficulty-btn medium" data-diff="medium">🟡 Medium (+ Priority)</button>
            <button class="difficulty-btn hard" data-diff="hard">🔴 Hard (+ Response)</button>
        </div>

        <div class="card ticket-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h3 style="font-size: 16px;">📧 CURRENT TICKET</h3>
                <button id="loadTicketBtn" class="btn btn-secondary btn-sm">🔄 Load Ticket</button>
            </div>
            <div class="ticket-text" id="ticketText">Click "Load Ticket" to start</div>
            <div class="ticket-id" id="ticketId"></div>
            <div class="ai-suggestion" id="aiSuggestion">
                🤖 AI Suggests: <span id="suggestedCategory">-</span> | <span id="suggestedPriority">-</span>
            </div>
        </div>

        <div class="card">
            <h3 style="font-size: 16px; margin-bottom: 15px;">✍️ AGENT ACTION</h3>
            
            <div class="form-group">
                <label>📂 Category *</label>
                <select id="category">
                    <option value="">Select Category...</option>
                    <option value="delivery">🚚 Delivery Issue</option>
                    <option value="billing">💰 Billing Problem</option>
                    <option value="technical">🐛 Technical Bug</option>
                    <option value="account">🔐 Account Access</option>
                    <option value="general">❓ General Inquiry</option>
                </select>
            </div>

            <div class="form-group" id="priorityGroup">
                <label>⚡ Priority</label>
                <select id="priority">
                    <option value="">Select Priority...</option>
                    <option value="low">🟢 Low</option>
                    <option value="medium">🟡 Medium</option>
                    <option value="high">🟠 High</option>
                    <option value="urgent">🔴 Urgent</option>
                </select>
            </div>

            <div class="form-group" id="responseGroup">
                <label>💬 Response</label>
                <textarea id="response" rows="3" placeholder="Type your customer response here..."></textarea>
                <div class="button-group" id="responseButtons">
                    <button id="generateGoodBtn" class="btn btn-success btn-sm">✨ Good Response</button>
                    <button id="generateWrongBtn" class="btn btn-warning btn-sm">⚠️ Wrong Response</button>
                    <button id="copyResponseBtn" class="btn btn-secondary btn-sm">📋 Copy</button>
                    <button id="clearResponseBtn" class="btn btn-secondary btn-sm">🗑️ Clear</button>
                </div>
                <div class="quality-indicators" id="qualityIndicators"></div>
            </div>

            <button id="submitBtn" class="btn btn-primary">📤 Submit Action</button>
        </div>

        <div class="score-card" id="resultCard" style="display: none;">
            <div class="score-value" id="scoreValue">0.00</div>
            <div class="score-percent" id="scorePercent">0%</div>
            <div class="feedback" id="feedbackText"></div>
        </div>

        <div class="card">
            <h4 style="font-size: 14px;">📜 Submission History</h4>
            <div id="historyList" class="history-list">
                <table class="history-table" id="historyTable">
                    <thead>
                        <tr><th>Score</th><th>Difficulty</th><th>Category</th><th>Time</th></tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="4" style="text-align: center; color: #64748b;">No submissions yet</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "";
        let currentDifficulty = "easy";
        let currentTicket = null;
        let history = [];

        const goodResponses = {
            "delivery": "I sincerely apologize for the issue with your order. Let me immediately track your package and provide you with an update within 2 hours.",
            "billing": "I apologize for the billing confusion. Let me review your account and correct this charge immediately.",
            "technical": "I'm sorry you're experiencing this technical issue. Our engineering team is actively working on a fix.",
            "account": "I apologize for the account trouble. Let me help you regain access and secure your account right away.",
            "general": "Thank you for reaching out. I'd be happy to help with your question."
        };

        const wrongResponses = ["No.", "K", "Not my problem", "I don't care", "Whatever", "Figure it out"];

        function detectCategoryFromTicket(text) {
            const lower = text.toLowerCase();
            if (lower.includes('order') || lower.includes('delivery') || lower.includes('package')) return 'delivery';
            if (lower.includes('charge') || lower.includes('billing') || lower.includes('payment')) return 'billing';
            if (lower.includes('crash') || lower.includes('bug') || lower.includes('error')) return 'technical';
            if (lower.includes('password') || lower.includes('login') || lower.includes('account')) return 'account';
            return 'general';
        }

        function detectPriorityFromTicket(text) {
            const lower = text.toLowerCase();
            if (lower.includes('urgent') || lower.includes('emergency')) return 'urgent';
            if (lower.includes('days') || lower.includes('waiting')) return 'high';
            return 'medium';
        }

        function updateUIByDifficulty() {
            const priorityGroup = document.getElementById('priorityGroup');
            const responseGroup = document.getElementById('responseGroup');
            const responseButtons = document.getElementById('responseButtons');
            const qualityIndicators = document.getElementById('qualityIndicators');

            if (currentDifficulty === 'easy') {
                if (priorityGroup) priorityGroup.style.display = 'none';
                if (responseGroup) responseGroup.style.display = 'none';
                if (responseButtons) responseButtons.style.display = 'none';
                if (qualityIndicators) qualityIndicators.style.display = 'none';
            } else if (currentDifficulty === 'medium') {
                if (priorityGroup) priorityGroup.style.display = 'block';
                if (responseGroup) responseGroup.style.display = 'none';
                if (responseButtons) responseButtons.style.display = 'none';
                if (qualityIndicators) qualityIndicators.style.display = 'none';
            } else {
                if (priorityGroup) priorityGroup.style.display = 'block';
                if (responseGroup) responseGroup.style.display = 'block';
                if (responseButtons) responseButtons.style.display = 'flex';
                if (qualityIndicators) qualityIndicators.style.display = 'flex';
                updateQualityIndicators();
            }
        }

        function updateQualityIndicators() {
            const response = document.getElementById('response').value;
            const indicators = document.getElementById('qualityIndicators');
            
            if (!response || response.length < 5) {
                indicators.innerHTML = '<span class="indicator bad">⚠️ Response required</span>';
                return;
            }
            
            const lower = response.toLowerCase();
            const hasEmpathy = lower.includes('sorry') || lower.includes('apologize');
            const hasAction = lower.includes('check') || lower.includes('track') || lower.includes('help') || lower.includes('fix');
            const goodLength = response.length > 20;
            
            indicators.innerHTML = `
                <span class="indicator ${hasEmpathy ? 'good' : 'bad'}">${hasEmpathy ? '❤️ Has empathy ✅' : '❤️ No empathy ❌'}</span>
                <span class="indicator ${goodLength ? 'good' : 'bad'}">${goodLength ? '📏 Good length ✅' : '📏 Too short ❌'}</span>
                <span class="indicator ${hasAction ? 'good' : 'bad'}">${hasAction ? '⚡ Action words ✅' : '⚡ No action ❌'}</span>
            `;
        }

        function updateAISuggestion() {
            if (currentTicket && currentTicket.ticket_text) {
                const cat = detectCategoryFromTicket(currentTicket.ticket_text);
                const pri = detectPriorityFromTicket(currentTicket.ticket_text);
                document.getElementById('suggestedCategory').innerHTML = `<strong style="color:#10b981;">${cat}</strong> 👍`;
                document.getElementById('suggestedPriority').innerHTML = `<strong style="color:#10b981;">${pri}</strong> 👍`;
            }
        }

        function generateGoodResponse() {
            if (!currentTicket) { alert('Load a ticket first!'); return; }
            const cat = detectCategoryFromTicket(currentTicket.ticket_text);
            document.getElementById('response').value = goodResponses[cat] || goodResponses['general'];
            updateQualityIndicators();
        }

        function generateWrongResponse() {
            if (!currentTicket) { alert('Load a ticket first!'); return; }
            document.getElementById('response').value = wrongResponses[Math.floor(Math.random() * wrongResponses.length)];
            updateQualityIndicators();
        }

        async function loadTicket() {
            try {
                const res = await fetch(`${API_URL}/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_difficulty: currentDifficulty })
                });
                currentTicket = await res.json();
                document.getElementById('ticketText').innerHTML = `"${currentTicket.ticket_text}"`;
                document.getElementById('ticketId').innerHTML = `Ticket ID: ${currentTicket.ticket_id} | Level: ${currentTicket.task_level}`;
                document.getElementById('category').value = '';
                document.getElementById('priority').value = '';
                document.getElementById('response').value = '';
                document.getElementById('resultCard').style.display = 'none';
                updateAISuggestion();
                updateQualityIndicators();
                
                // Remove wrong/correct classes
                document.getElementById('category').classList.remove('wrong', 'correct');
                if (document.getElementById('priority')) document.getElementById('priority').classList.remove('wrong', 'correct');
            } catch (error) {
                document.getElementById('ticketText').innerHTML = 'Error loading ticket. Make sure Space is running.';
            }
        }

        async function submitAction() {
            const category = document.getElementById('category').value;
            const priority = document.getElementById('priority').value;
            const response = document.getElementById('response').value;
            
            if (!category) { alert('Please select a category!'); return; }
            
            const submitBtn = document.getElementById('submitBtn');
            const resultCard = document.getElementById('resultCard');
            
            // Show loading state with spinner
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Analyzing your response...';
            submitBtn.style.opacity = '0.7';
            
            // Hide previous result
            resultCard.style.display = 'none';
            
            // Show "thinking" message
            const thinkingMsg = document.createElement('div');
            thinkingMsg.id = 'thinkingMsg';
            thinkingMsg.className = 'thinking-message';
            thinkingMsg.innerHTML = '🤔 AI is evaluating your response...';
            document.querySelector('.card').after(thinkingMsg);
            
            try {
                const startTime = Date.now();
                
                let payload = { classification: category, priority: "", response: "" };
                if (currentDifficulty === 'medium' || currentDifficulty === 'hard') {
                    payload.priority = priority;
                }
                if (currentDifficulty === 'hard') {
                    payload.response = response;
                }
                
                const res = await fetch(`${API_URL}/step`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                const reward = data.reward?.total || 0;
                const feedback = data.reward?.breakdown || '';
                
                // Calculate elapsed time
                const elapsedTime = Date.now() - startTime;
                const minDisplayTime = 1500; // Show loading for at least 1.5 seconds
                
                // Ensure loading shows for minimum time
                if (elapsedTime < minDisplayTime) {
                    await new Promise(resolve => setTimeout(resolve, minDisplayTime - elapsedTime));
                }
                
                // Remove thinking message
                const thinkingEl = document.getElementById('thinkingMsg');
                if (thinkingEl) thinkingEl.remove();
                
                // Display result with animation
                displayResult(reward, feedback, category);
                
                // Add to history
                addToHistory(currentDifficulty, category, reward);
                
                // Auto-load next ticket after 3 seconds
                setTimeout(() => loadTicket(), 3000);
                
            } catch (error) {
                const thinkingEl = document.getElementById('thinkingMsg');
                if (thinkingEl) thinkingEl.remove();
                alert('Error submitting. Check if Space is running.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '📤 Submit Action';
                submitBtn.style.opacity = '1';
            }
        }

        function displayResult(reward, feedback, category) {
            const resultCard = document.getElementById('resultCard');
            const scoreValue = document.getElementById('scoreValue');
            const scorePercent = document.getElementById('scorePercent');
            const feedbackText = document.getElementById('feedbackText');
            
            const percentage = (reward * 100).toFixed(0);
            
            // Animate score counting
            let currentScore = 0;
            const increment = reward / 20;
            const interval = setInterval(() => {
                currentScore += increment;
                if (currentScore >= reward) {
                    currentScore = reward;
                    clearInterval(interval);
                }
                scoreValue.innerHTML = currentScore.toFixed(2);
                scorePercent.innerHTML = `${Math.floor(currentScore * 100)}%`;
            }, 30);
            
            feedbackText.innerHTML = feedback;
            
            // Color code based on score
            resultCard.classList.remove('high', 'medium', 'low');
            if (reward >= 0.7) {
                resultCard.classList.add('high');
                // Confetti effect for high scores
                if (typeof confetti === 'function') {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                }
            } else if (reward >= 0.4) {
                resultCard.classList.add('medium');
            } else {
                resultCard.classList.add('low');
            }
            
            resultCard.style.display = 'block';
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function addToHistory(difficulty, category, score) {
            const percentage = (score * 100).toFixed(0);
            const historyBody = document.getElementById('historyBody');
            
            // Clear "No submissions yet" row if this is the first submission
            if (historyBody.children.length === 1 && historyBody.children[0].innerText.includes('No submissions')) {
                historyBody.innerHTML = '';
            }
            
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td class="${score >= 0.7 ? 'history-score-high' : score >= 0.4 ? 'history-score-medium' : 'history-score-low'}">${percentage}%</td>
                <td><span class="history-badge ${difficulty}">${difficulty}</span></td>
                <td>${category}</td>
                <td style="color:#64748b;">${new Date().toLocaleTimeString()}</td>
            `;
            
            // Add to top
            if (historyBody.firstChild) {
                historyBody.insertBefore(newRow, historyBody.firstChild);
            } else {
                historyBody.appendChild(newRow);
            }
            
            // Keep only last 10
            while (historyBody.children.length > 10) {
                historyBody.removeChild(historyBody.lastChild);
            }
        }

        // Event Listeners
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDifficulty = btn.dataset.diff;
                updateUIByDifficulty();
                loadTicket();
            });
        });

        document.getElementById('loadTicketBtn').addEventListener('click', loadTicket);
        document.getElementById('submitBtn').addEventListener('click', submitAction);
        document.getElementById('generateGoodBtn').addEventListener('click', generateGoodResponse);
        document.getElementById('generateWrongBtn').addEventListener('click', generateWrongResponse);
        document.getElementById('copyResponseBtn').addEventListener('click', () => {
            const val = document.getElementById('response').value;
            if (val) navigator.clipboard.writeText(val);
        });
        document.getElementById('clearResponseBtn').addEventListener('click', () => {
            document.getElementById('response').value = '';
            updateQualityIndicators();
        });
        document.getElementById('response').addEventListener('input', updateQualityIndicators);

        // Removed redeclaration of API_URL since it is already defined as an empty string at the top.
        
        updateUIByDifficulty();
        loadTicket();
    </script>
</body>
</html>
