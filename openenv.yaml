name: support-agent-env
description: Customer support ticket classification environment for AI agents
version: "1.0.0"
author: visshaalpvt

observation_space:
  type: text
  description: Customer ticket with issue description

action_space:
  type: discrete
  actions:
    - delivery
    - billing
    - technical
    - account
    - general
  description: Classification category for the support ticket

endpoints:
  health: /health
  reset: /reset
  step: /step
  state: /state

tasks:
  - id: easy
    description: Classify the ticket category only
    steps: 1
    ideal_action: delivery
    grader: classification_accuracy

  - id: medium
    description: Classify category and detect priority level
    steps: 1
    ideal_action: billing
    grader: classification_and_priority

  - id: hard
    description: Classify, prioritize, and write a customer response
    steps: 1
    ideal_action: general
    grader: full_response_quality

scoring:
  reward_range: [0.01, 0.99]
  success_threshold: 0.5
  score_formula: mean(step_rewards)

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2
