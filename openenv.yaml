name: support-agent-env
version: 1.0.0
description: Customer support environment for training AI agents

tasks:
  - id: easy
    name: Easy Task
    description: Classify the ticket category
    max_steps: 1
    difficulty: easy
  - id: medium
    name: Medium Task
    description: Classify category and detect priority
    max_steps: 1
    difficulty: medium
  - id: hard
    name: Hard Task
    description: Classify, prioritize, and respond
    max_steps: 1
    difficulty: hard

actions:
  category:
    type: string
    required: true
    enum: ["delivery", "billing", "technical", "account", "general"]
  priority:
    type: string
    required: false
    enum: ["low", "medium", "high", "urgent"]
  response_text:
    type: string
    required: false

observations:
  ticket_id:
    type: string
  customer_message:
    type: string
  task_difficulty:
    type: string
  step_number:
    type: integer
  done:
    type: boolean

rewards:
  range: [0.01, 0.99]
  partial_credit: true
  clip_fn: clamp_score
