name: support-agent-env
description: Customer support environment for AI agents
version: "1.0.0"
author: visshaalpvt

observation_space:
  type: text
  description: Customer ticket with issue description

action_space:
  type: discrete
  actions:
    - delivery
    - billing
    - technical
    - account
    - general
  description: Classification category

endpoints:
  health: /health
  reset: /reset
  step: /step
  state: /state

tasks:
  - id: easy
    description: Classify the ticket category
    steps: 1
    ideal_action: delivery

  - id: medium
    description: Classify category and detect priority
    steps: 1
    ideal_action: delivery

  - id: hard
    description: Classify, prioritize, and respond
    steps: 1
    ideal_action: delivery

scoring:
  reward_range: [0.01, 0.99]
  success_threshold: 0.5
  score_formula: mean(step_rewards)

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2
