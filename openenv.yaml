name: support-agent-env
version: 1.0.0
description: Customer support automation environment for training AI agents
author: visshaalpvt
license: MIT

server:
  port: 7860
  host: 0.0.0.0

inference:
  script: inference.py
  entrypoint: "python inference.py"

tasks:
  - id: easy
    name: Classification Only
    description: Agent must classify the ticket category
    max_steps: 1
    difficulty: easy
    
  - id: medium
    name: Classification + Priority
    description: Agent must classify category and detect priority
    max_steps: 1
    difficulty: medium
    
  - id: hard
    name: Full Response
    description: Agent must classify, prioritize, and write empathetic response
    max_steps: 1
    difficulty: hard

actions:
  category:
    type: string
    required: true
    enum: ["delivery", "billing", "technical", "account", "general"]
  priority:
    type: string
    required: false
    enum: ["low", "medium", "high", "urgent"]
  response_text:
    type: string
    required: false

observations:
  ticket_id:
    type: string
  customer_message:
    type: string
  task_difficulty:
    type: string
    enum: ["easy", "medium", "hard"]
  step_number:
    type: integer
  done:
    type: boolean

rewards:
  range: [0.05, 0.95]   # strictly open interval — no 0.0 or 1.0 ever returned
  partial_credit: true
  clip_fn: clip_score    # defined in tasks/grader.py, applied to every task score
