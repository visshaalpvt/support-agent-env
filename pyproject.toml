[project]
name = "support-agent-env"
version = "1.0.0"
description = "OpenEnv customer support environment for training AI agents"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "visshaalpvt", email = "visshaalpvt@example.com"}
]
dependencies = [
    "fastapi>=0.104.1",
    "uvicorn>=0.24.0",
    "pydantic>=2.4.2",
    "python-multipart>=0.0.6",
    "openai>=1.6.1",
    "aiohttp>=3.9.0",
    "openenv-core>=0.2.0",
]

[project.scripts]
server = "server.app:main"
participant = "inference:main"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["support_env", "graders", "schema", "api", "inference"]

[tool.setuptools.package-data]
"*" = ["*.yaml", "*.json", "*.html", "*.md", "*.txt", "Dockerfile", "requirements.txt"]
