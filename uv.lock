version = 1
requires-python = ">=3.11"

[[package]]
name = "fastapi"
version = "0.104.1"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "pydantic" },
    { name = "starlette" },
    { name = "typing-extensions" },
]

[[package]]
name = "uvicorn"
version = "0.24.0"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "click" },
    { name = "h11" },
    { name = "typing-extensions" },
]

[[package]]
name = "pydantic"
version = "2.4.2"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "annotated-types" },
    { name = "pydantic-core" },
    { name = "typing-extensions" },
]

[[package]]
name = "openai"
version = "1.6.1"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "anyio" },
    { name = "distro" },
    { name = "httpx" },
    { name = "pydantic" },
    { name = "sniffio" },
    { name = "tqdm" },
    { name = "typing-extensions" },
]

[[package]]
name = "aiohttp"
version = "3.9.0"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "aiohttp" },
    { name = "aiosignal" },
    { name = "async-timeout" },
    { name = "attrs" },
    { name = "charset-normalizer" },
    { name = "frozenlist" },
    { name = "multidict" },
    { name = "yarl" },
]

[metadata]
minimum-uv-version = "0.1.0"
